<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Turboplay</title>
    <meta
      name="description"
      content="Turboplay is an offline synth arcade of fast classics and minigames built for mobile, tablet, and laptop."
    />
    <meta name="theme-color" content="#0b1020" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="arcade-shell">
      <header class="appbar" aria-label="Turboplay header">
        <div class="brand">
          <div class="brand-mark">TP</div>
          <div class="brand-copy">
            <p class="eyebrow">Offline synth arcade</p>
            <h1>Turboplay</h1>
          </div>
        </div>
        <div class="appbar-meta">
          <span class="appbar-count" data-game-count>13 games</span>
        </div>
        <div class="appbar-actions">
          <button class="action action-secondary" type="button" data-audio-toggle>Audio On</button>
          <button class="action action-install" type="button" data-install>Install</button>
        </div>
      </header>

      <div class="statusline" aria-live="polite">
        <span data-offline-status>Booting offline mode...</span>
        <span data-install-status></span>
      </div>

      <div class="game-type-strip" data-game-types aria-label="Game types"></div>

      <div class="game-rail-wrap" data-game-rail-wrap>
        <button class="rail-arrow rail-arrow-left" type="button" data-rail-left aria-label="Scroll games left">
          <span aria-hidden="true">&#8249;</span>
        </button>
        <nav class="game-rail" data-game-rail aria-label="Game picker"></nav>
        <button class="rail-arrow rail-arrow-right" type="button" data-rail-right aria-label="Scroll games right">
          <span aria-hidden="true">&#8250;</span>
        </button>
      </div>

      <section class="cabinet" data-cabinet>
        <div class="cabinet-head">
          <div>
            <p class="eyebrow" data-game-kicker></p>
            <h2 data-game-title></h2>
          </div>
          <div class="score-cluster">
            <div class="score-box">
              <span data-current-label></span>
              <strong data-current-value>0</strong>
            </div>
            <div class="score-box">
              <span data-best-label></span>
              <strong data-best-value>0</strong>
            </div>
          </div>
        </div>

        <div class="cabinet-controls">
          <button class="action action-primary" type="button" data-primary-action></button>
          <button class="action action-secondary" type="button" data-secondary-action hidden></button>
          <p class="hintline" data-game-hint></p>
        </div>

        <div class="stage-frame">
          <div class="stage" data-stage></div>
        </div>
      </section>

      <footer class="footer-strip" aria-label="Quick info">
        <span>quick sessions</span>
        <span>tap + swipe</span>
        <span>offline</span>
        <span>mobile first</span>
      </footer>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
